<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northstar Creative | Contact</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Northstar Creative</a>
      <nav class="main-nav" aria-label="Primary">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="about.html">About</a>
        <a class="nav-link active" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container page-section">
    <section class="contact-wrap">
      <div>
        <p class="eyebrow">Contact</p>
        <h1>Let us build something great together.</h1>
        <p>
          Tell us about your project, goals, and timeline. We will get back to you shortly.
        </p>
      </div>

      <form id="contactForm" class="contact-form" novalidate>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your full name" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="Tell us about your idea"></textarea>

        <button class="btn btn-primary" type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Northstar Creative. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
