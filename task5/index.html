<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEKHAR COMMERCE | Task 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2874f0;
            --primary-dark: #1c5ec9;
            --accent: #fb641b;
            --dark: #212121;
            --muted: #878787;
            --light: #f1f3f6;
            --white: #ffffff;
            --border: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--light); color: var(--dark); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .top-tools {
            background: var(--white);
            border-bottom: 1px solid var(--border);
        }
        .top-tools .container {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-top: 10px;
            padding-bottom: 10px;
        }
        .quick-chip {
            border: 1px solid #d5d5d5;
            background: #fff;
            color: #444;
            border-radius: 999px;
            padding: 7px 12px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
        }
        .quick-chip:hover,
        .quick-chip.active {
            border-color: var(--primary);
            color: var(--primary);
            background: #eef4ff;
        }

        /* Header */
        header {
            background: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        nav {
            display: grid;
            grid-template-columns: 170px minmax(240px, 1fr) auto auto;
            gap: 14px;
            align-items: center;
            padding: 10px 0;
        }
        .logo {
            color: var(--white);
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.2px;
        }
        .logo span {
            color: #ffe11b;
            font-style: italic;
        }
        .header-search {
            height: 40px;
            background: var(--white);
            border-radius: 2px;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        .header-search i {
            color: var(--primary);
            width: 40px;
            text-align: center;
            font-size: 0.95rem;
        }
        .header-search input {
            width: 100%;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            color: #333;
            padding-right: 10px;
        }
        .login-btn {
            background: var(--white);
            color: var(--primary);
            border: none;
            height: 34px;
            min-width: 110px;
            padding: 0 20px;
            border-radius: 2px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .login-btn:hover { background: #f5f8ff; }
        .cart-icon {
            color: var(--white);
            font-size: 1.15rem;
            cursor: pointer;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }
        #cartCount {
            position: absolute;
            top: -4px;
            right: -6px;
            background: var(--accent);
            color: #fff;
            font-size: 0.7rem;
            min-width: 18px;
            height: 18px;
            line-height: 18px;
            text-align: center;
            padding: 0 4px;
            border-radius: 100px;
            font-weight: 700;
        }

        /* Main Layout & Controls */
        .page-title { margin: 1.1rem 0 1rem; font-size: 1.5rem; font-weight: 600; }
        .catalog-layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
            margin-bottom: 1.2rem;
        }
        .filters {
            background: #fff;
            border: 1px solid var(--border);
            padding: 14px;
            position: sticky;
            top: 74px;
        }
        .filter-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .filter-title {
            font-size: 1rem;
            font-weight: 600;
        }
        .clear-btn {
            border: none;
            background: transparent;
            color: var(--primary);
            font-size: 0.78rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        .filter-group {
            border-top: 1px solid #ececec;
            padding-top: 0.8rem;
            margin-top: 0.8rem;
        }
        .filter-group h3 {
            font-size: 0.78rem;
            letter-spacing: 0.3px;
            color: #666;
            margin-bottom: 0.6rem;
        }
        .check-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.84rem;
            color: #3f3f3f;
            margin-bottom: 0.45rem;
        }
        .check-row input[type="checkbox"] {
            accent-color: var(--primary);
            width: 14px;
            height: 14px;
        }
        .price-range {
            width: 100%;
        }
        .price-label {
            font-size: 0.82rem;
            color: #666;
            margin-top: 0.45rem;
        }
        .products-area {
            min-width: 0;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 1.2rem;
            background: var(--white);
            border: 1px solid var(--border);
            padding: 12px;
        }
        .controls select {
            height: 42px;
            padding: 0 12px;
            border: 1px solid #d6d6d6;
            border-radius: 2px;
            font-family: inherit;
            background: #fff;
            outline: none;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 1.2rem;
        }
        .product-card {
            background: var(--white);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            text-align: left;
            padding-bottom: 0.9rem;
        }
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }
        .product-card img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            display: block;
        }
        .product-info { padding: 0.9rem; }
        .product-info h3 {
            font-size: 0.95rem;
            margin-bottom: 0.35rem;
            font-weight: 500;
            min-height: 44px;
        }
        .product-info p {
            color: var(--muted);
            font-size: 0.82rem;
            margin-bottom: 0.4rem;
        }
        .meta-line {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            margin-bottom: 0.35rem;
            flex-wrap: wrap;
        }
        .rating-pill {
            background: #388e3c;
            color: #fff;
            border-radius: 2px;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 2px 6px;
            line-height: 1;
        }
        .assured-pill {
            background: #f3f8ff;
            color: #1c5ec9;
            border: 1px solid #cddfff;
            border-radius: 2px;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 6px;
            line-height: 1;
            text-transform: uppercase;
        }
        .price-line {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .price {
            font-weight: 700;
            color: #111;
            font-size: 1.12rem;
        }
        .mrp {
            color: #8c8c8c;
            text-decoration: line-through;
            font-size: 0.8rem;
        }
        .discount {
            color: #388e3c;
            font-size: 0.82rem;
            font-weight: 600;
        }
        .add-to-cart {
            margin-top: 0.8rem;
            background: var(--accent);
            color: #fff;
            border: none;
            height: 38px;
            padding: 0 14px;
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.2s ease;
            font-family: inherit;
            font-size: 0.86rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }
        .add-to-cart:hover { background: #e85a18; }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--white);
            border: 1px solid var(--border);
            padding: 0.9rem;
        }
        .pagination button {
            padding: 0.5rem 1rem;
            border: 1px solid #d4d4d4;
            background: #fff;
            cursor: pointer;
            border-radius: 2px;
            font-family: inherit;
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Cart Sidebar */
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); visibility: hidden; opacity: 0; transition: 0.3s; z-index: 90; }
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 100%; max-width: 400px; height: 100%; background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: right 0.3s ease; z-index: 100; display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-overlay.open { visibility: visible; opacity: 1; }
        .cart-header { display: flex; justify-content: space-between; padding: 1.5rem; border-bottom: 1px solid var(--border); }
        .cart-header button { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .cart-item-details h4 { font-size: 1rem; }
        .cart-item-actions { display: flex; align-items: center; gap: 0.5rem; }
        .cart-item-actions button { padding: 0.25rem 0.55rem; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 2px; }
        .remove-btn { color: red; background: none; border: none; cursor: pointer; }
        .cart-footer { padding: 1.5rem; border-top: 1px solid var(--border); }
        .checkout-btn { width: 100%; padding: 1rem; background: var(--accent); color: #fff; border: none; border-radius: 2px; font-size: 1rem; cursor: pointer; margin-top: 1rem; font-weight: 600; }

        .empty-state {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 1rem;
            color: var(--muted);
        }

        @media (max-width: 900px) {
            nav {
                grid-template-columns: 140px 1fr auto;
            }
            .login-btn {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .container { padding: 0 12px; }
            nav {
                grid-template-columns: 1fr auto;
                grid-template-areas:
                    "logo cart"
                    "search search";
                gap: 10px;
            }
            .logo { grid-area: logo; }
            .cart-icon { grid-area: cart; justify-self: end; }
            .header-search { grid-area: search; }
            .page-title {
                font-size: 1.2rem;
                margin-top: 1rem;
            }
            .catalog-layout {
                grid-template-columns: 1fr;
            }
            .filters {
                position: static;
                top: unset;
            }
            .controls {
                grid-template-columns: 1fr;
                padding: 10px;
            }
            .product-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .product-card img {
                height: 160px;
            }
            .product-info h3 {
                min-height: 36px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
            .pagination {
                gap: 0.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="container">
            <div class="logo">SHEKHAR <span>COMMERCE</span></div>
            <div class="header-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search for products, brands and more">
            </div>
            <button class="login-btn" type="button">Login</button>
            <div class="cart-icon" id="cartIcon">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartCount">0</span>
            </div>
        </nav>
    </header>

    <section class="top-tools">
        <div class="container" id="quickCategories">
            <button class="quick-chip active" data-category="all" type="button">All</button>
            <button class="quick-chip" data-category="Electronics" type="button">Electronics</button>
            <button class="quick-chip" data-category="Fashion" type="button">Fashion</button>
            <button class="quick-chip" data-category="Grocery" type="button">Grocery</button>
            <button class="quick-chip" data-category="Top Offers" type="button">Top Offers</button>
        </div>
    </section>

    <main class="container">
        <h1 class="page-title">Product Catalog</h1>

        <section class="catalog-layout">
            <aside class="filters">
                <div class="filter-head">
                    <h2 class="filter-title">Filters</h2>
                    <button id="clearFilters" class="clear-btn" type="button">CLEAR ALL</button>
                </div>

                <div class="filter-group">
                    <h3>PRICE</h3>
                    <input class="price-range" id="priceRange" type="range" min="500" max="15000" step="500" value="15000">
                    <p class="price-label">Up to Rs <span id="priceValue">15000</span></p>
                </div>

                <div class="filter-group">
                    <h3>RATING</h3>
                    <label class="check-row"><input type="checkbox" name="rating" value="4"> 4 star and above</label>
                    <label class="check-row"><input type="checkbox" name="rating" value="3"> 3 star and above</label>
                </div>

                <div class="filter-group">
                    <h3>BRAND</h3>
                    <label class="check-row"><input type="checkbox" name="brand" value="Nova"> Nova</label>
                    <label class="check-row"><input type="checkbox" name="brand" value="Stride"> Stride</label>
                    <label class="check-row"><input type="checkbox" name="brand" value="PureFarm"> PureFarm</label>
                    <label class="check-row"><input type="checkbox" name="brand" value="MobiTech"> MobiTech</label>
                    <label class="check-row"><input type="checkbox" name="brand" value="Denwer"> Denwer</label>
                    <label class="check-row"><input type="checkbox" name="brand" value="Leafy"> Leafy</label>
                    <label class="check-row"><input type="checkbox" name="brand" value="GameX"> GameX</label>
                    <label class="check-row"><input type="checkbox" name="brand" value="UrbanCot"> UrbanCot</label>
                    <label class="check-row"><input type="checkbox" name="brand" value="BoomBox"> BoomBox</label>
                </div>
            </aside>

            <div class="products-area">
                <section class="controls">
                    <select id="categoryFilter">
                        <option value="all">All Categories</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Grocery">Grocery</option>
                    </select>

                    <select id="sortSelect">
                        <option value="default">Sort By</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                        <option value="alpha">Alphabetical (A-Z)</option>
                    </select>
                </section>

                <section class="product-grid" id="productGrid">
                </section>

                <div class="pagination" id="paginationControls">
                    <button id="prevPage">Prev</button>
                    <span id="pageInfo">Page 1 of 1</span>
                    <button id="nextPage">Next</button>
                </div>
            </div>
        </section>
    </main>

    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button id="closeCart"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            </div>
        <div class="cart-footer">
            <h3>Total: ₹<span id="cartTotal">0</span></h3>
            <button class="checkout-btn">Checkout</button>
        </div>
    </aside>

    <script>
        // 1. Mock Product Data
        const products = [
            { id: 1, title: "Smart Headphones", price: 2999, category: "Electronics", brand: "Nova", rating: 4.2, mrp: 4999, assured: true, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80" },
            { id: 2, title: "Running Shoes", price: 1599, category: "Fashion", brand: "Stride", rating: 4.1, mrp: 2599, assured: true, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80" },
            { id: 3, title: "Organic Almonds", price: 899, category: "Grocery", brand: "PureFarm", rating: 3.9, mrp: 1299, assured: false, image: "https://images.unsplash.com/photo-1508061253366-f7da158b6d46?w=500&q=80" },
            { id: 4, title: "Smartphone", price: 14999, category: "Electronics", brand: "MobiTech", rating: 4.5, mrp: 19999, assured: true, image: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500&q=80" },
            { id: 5, title: "Denim Jacket", price: 2199, category: "Fashion", brand: "Denwer", rating: 3.8, mrp: 3499, assured: false, image: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=500&q=80" },
            { id: 6, title: "Green Tea", price: 450, category: "Grocery", brand: "Leafy", rating: 4.0, mrp: 799, assured: true, image: "https://images.unsplash.com/photo-1627435601361-ec25f5b1d0e5?w=500&q=80" },
            { id: 7, title: "Gaming Mouse", price: 1299, category: "Electronics", brand: "GameX", rating: 4.3, mrp: 1999, assured: true, image: "https://images.unsplash.com/photo-1527814050087-379381547969?w=500&q=80" },
            { id: 8, title: "Cotton T-Shirt", price: 499, category: "Fashion", brand: "UrbanCot", rating: 3.7, mrp: 999, assured: false, image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500&q=80" },
            { id: 9, title: "Bluetooth Speaker", price: 3499, category: "Electronics", brand: "BoomBox", rating: 4.4, mrp: 5499, assured: true, image: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=500&q=80" },
            { id: 10, title: "Wireless Earbuds", price: 2499, category: "Electronics", brand: "Nova", rating: 4.2, mrp: 3999, assured: true, image: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=500&q=80" },
            { id: 11, title: "Sports Hoodie", price: 1799, category: "Fashion", brand: "Stride", rating: 4.0, mrp: 2799, assured: true, image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500&q=80" },
            { id: 12, title: "Cashew Nuts", price: 1099, category: "Grocery", brand: "PureFarm", rating: 4.1, mrp: 1599, assured: false, image: "https://images.unsplash.com/photo-1615485925763-86786288908a?w=500&q=80" },
            { id: 13, title: "Power Bank", price: 1399, category: "Electronics", brand: "MobiTech", rating: 4.3, mrp: 2299, assured: true, image: "https://images.unsplash.com/photo-1587033411391-5d9e51cce126?w=500&q=80" },
            { id: 14, title: "Slim Fit Jeans", price: 1899, category: "Fashion", brand: "Denwer", rating: 3.9, mrp: 2999, assured: false, image: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=500&q=80" },
            { id: 15, title: "Herbal Honey", price: 699, category: "Grocery", brand: "Leafy", rating: 4.2, mrp: 1199, assured: true, image: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=500&q=80" },
            { id: 16, title: "Mechanical Keyboard", price: 3299, category: "Electronics", brand: "GameX", rating: 4.4, mrp: 4999, assured: true, image: "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=500&q=80" },
            { id: 17, title: "Polo T-Shirt", price: 899, category: "Fashion", brand: "UrbanCot", rating: 3.8, mrp: 1499, assured: false, image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500&q=80" },
            { id: 18, title: "Party Speaker", price: 5999, category: "Electronics", brand: "BoomBox", rating: 4.5, mrp: 8999, assured: true, image: "https://images.unsplash.com/photo-1545454675-3531b543be5d?w=500&q=80" },
            { id: 19, title: "Fitness Band", price: 2199, category: "Electronics", brand: "MobiTech", rating: 4.1, mrp: 3499, assured: true, image: "https://images.unsplash.com/photo-1575311373937-040b8e1fd5b6?w=500&q=80" },
            { id: 20, title: "Trail Running Cap", price: 599, category: "Fashion", brand: "Stride", rating: 3.9, mrp: 999, assured: true, image: "https://images.unsplash.com/photo-1521369909029-2afed882baee?w=500&q=80" },
            { id: 21, title: "Protein Muesli", price: 799, category: "Grocery", brand: "PureFarm", rating: 4.0, mrp: 1299, assured: true, image: "https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?w=500&q=80" }
        ];

        // 2. Global State Variables
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let filteredProducts = [...products];
        let currentPage = 1;
        let selectedCategoryChip = "all";
        const itemsPerPage = 4; // Show 4 items per page to demonstrate pagination

        // 3. DOM Elements
        const productGrid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const sortSelect = document.getElementById('sortSelect');
        const prevBtn = document.getElementById('prevPage');
        const nextBtn = document.getElementById('nextPage');
        const pageInfo = document.getElementById('pageInfo');
        const priceRange = document.getElementById('priceRange');
        const priceValue = document.getElementById('priceValue');
        const ratingChecks = document.querySelectorAll('input[name="rating"]');
        const brandChecks = document.querySelectorAll('input[name="brand"]');
        const clearFiltersBtn = document.getElementById('clearFilters');
        const quickChips = document.querySelectorAll('.quick-chip');

        // 4. Core Logic: Filtering & Sorting
        function applyFilters() {
            let results = products;
            const searchTerm = searchInput.value.toLowerCase();
            const category = categoryFilter.value;
            const sortBy = sortSelect.value;
            const maxPrice = Number(priceRange.value);
            const checkedRatings = Array.from(ratingChecks).filter(c => c.checked).map(c => Number(c.value));
            const checkedBrands = Array.from(brandChecks).filter(c => c.checked).map(c => c.value);

            // Search Filter
            if (searchTerm) {
                results = results.filter(p => p.title.toLowerCase().includes(searchTerm));
            }

            // Category Filter
            if (category !== "all") {
                results = results.filter(p => p.category === category);
            }
            if (selectedCategoryChip !== "all" && selectedCategoryChip !== "Top Offers") {
                results = results.filter(p => p.category === selectedCategoryChip);
            }
            if (selectedCategoryChip === "Top Offers") {
                results = results.filter(p => getDiscountPercent(p) >= 35);
            }

            // Price Filter
            results = results.filter(p => p.price <= maxPrice);

            // Rating Filter
            if (checkedRatings.length > 0) {
                const minRating = Math.max(...checkedRatings);
                results = results.filter(p => p.rating >= minRating);
            }

            // Brand Filter
            if (checkedBrands.length > 0) {
                results = results.filter(p => checkedBrands.includes(p.brand));
            }

            // Sorting Logic
            if (sortBy === "price-asc") {
                results.sort((a, b) => a.price - b.price);
            } else if (sortBy === "price-desc") {
                results.sort((a, b) => b.price - a.price);
            } else if (sortBy === "alpha") {
                results.sort((a, b) => a.title.localeCompare(b.title));
            }

            filteredProducts = results;
            currentPage = 1; // Reset to first page after filtering
            renderProducts();
        }

        function getDiscountPercent(product) {
            return Math.round(((product.mrp - product.price) / product.mrp) * 100);
        }

        // 5. Core Logic: Pagination & Rendering
        function renderProducts() {
            productGrid.innerHTML = "";
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = filteredProducts.slice(startIndex, endIndex);

            if (paginatedItems.length === 0) {
                productGrid.innerHTML = "<p class='empty-state'>No products found.</p>";
            }

            paginatedItems.forEach(product => {
                const discount = getDiscountPercent(product);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.title}">
                    <div class="product-info">
                        <h3>${product.title}</h3>
                        <p>${product.category} | ${product.brand}</p>
                        <div class="meta-line">
                            <span class="rating-pill">${product.rating} <i class="fa-solid fa-star"></i></span>
                            ${product.assured ? '<span class="assured-pill">Assured</span>' : ''}
                        </div>
                        <div class="price-line">
                            <p class="price">Rs${product.price}</p>
                            <span class="mrp">Rs${product.mrp}</span>
                            <span class="discount">${discount}% off</span>
                        </div>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                    </div>
                `;
                productGrid.appendChild(card);
            });

            updatePaginationState();
        }

        function updatePaginationState() {
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
            pageInfo.textContent = `Page ${currentPage} of ${totalPages || 1}`;
            
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
        }

        // 6. Cart Logic (LocalStorage)
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const idx = cart.findIndex(item => item.id === product.id);
            
            if (idx !== -1) {
                cart[idx].qty += 1;
            } else {
                cart.push({...product, qty: 1 });
            }
            
            saveAndRenderCart();
        }

        function updateQty(productId, amount) {
            const idx = cart.findIndex(item => item.id === productId);
            if (idx !== -1) {
                cart[idx].qty += amount;
                if (cart[idx].qty <= 0) {
                    cart.splice(idx, 1); // Remove item if qty is 0
                }
            }
            saveAndRenderCart();
        }

        function saveAndRenderCart() {
            localStorage.setItem("cart", JSON.stringify(cart));
            
            const cartItemsContainer = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            
            cartItemsContainer.innerHTML = "";
            let total = 0;
            let count = 0;

            cart.forEach(item => {
                total += item.price * item.qty;
                count += item.qty;
                
                const cartItemDiv = document.createElement('div');
                cartItemDiv.className = 'cart-item';
                cartItemDiv.innerHTML = `
                    <div class="cart-item-details">
                        <h4>${item.title}</h4>
                        <p>₹${item.price} x ${item.qty}</p>
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="updateQty(${item.id}, -1)">-</button>
                        <span>${item.qty}</span>
                        <button onclick="updateQty(${item.id}, 1)">+</button>
                        <button class="remove-btn" onclick="updateQty(${item.id}, -${item.qty})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                cartItemsContainer.appendChild(cartItemDiv);
            });

            cartCount.textContent = count;
            cartTotal.textContent = total;
        }

        // 7. Event Listeners
        searchInput.addEventListener('input', applyFilters);
        categoryFilter.addEventListener('change', applyFilters);
        sortSelect.addEventListener('change', applyFilters);
        priceRange.addEventListener('input', () => {
            priceValue.textContent = priceRange.value;
            applyFilters();
        });
        ratingChecks.forEach(check => check.addEventListener('change', applyFilters));
        brandChecks.forEach(check => check.addEventListener('change', applyFilters));
        clearFiltersBtn.addEventListener('click', () => {
            searchInput.value = '';
            categoryFilter.value = 'all';
            sortSelect.value = 'default';
            priceRange.value = '15000';
            priceValue.textContent = '15000';
            selectedCategoryChip = 'all';
            ratingChecks.forEach(check => {
                check.checked = false;
            });
            brandChecks.forEach(check => {
                check.checked = false;
            });
            quickChips.forEach(chip => {
                chip.classList.toggle('active', chip.dataset.category === 'all');
            });
            applyFilters();
        });
        quickChips.forEach(chip => {
            chip.addEventListener('click', () => {
                selectedCategoryChip = chip.dataset.category;
                quickChips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                if (selectedCategoryChip === 'all' || selectedCategoryChip === 'Top Offers') {
                    categoryFilter.value = 'all';
                } else {
                    categoryFilter.value = selectedCategoryChip;
                }
                applyFilters();
            });
        });

        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) { currentPage--; renderProducts(); }
        });

        nextBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
            if (currentPage < totalPages) { currentPage++; renderProducts(); }
        });

        // Cart UI Toggles
        document.getElementById('cartIcon').addEventListener('click', () => {
            document.getElementById('cartSidebar').classList.add('open');
            document.getElementById('cartOverlay').classList.add('open');
        });

        document.getElementById('closeCart').addEventListener('click', closeCartUI);
        document.getElementById('cartOverlay').addEventListener('click', closeCartUI);

        function closeCartUI() {
            document.getElementById('cartSidebar').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('open');
        }

        // Initialize on page load
        renderProducts();
        saveAndRenderCart();
    </script>
</body>
</html>
